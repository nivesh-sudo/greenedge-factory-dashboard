<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Greenedge Ventures — Factory Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;color:#e2e8f0;font-family:'Inter','Segoe UI',sans-serif;min-height:100vh;padding:22px 14px}
.mono{font-family:'DM Mono',monospace}
.container{max-width:980px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:12px}
.header-left{display:flex;align-items:center;gap:16px}
.header-logo{height:52px;width:auto;border-radius:8px;background:rgba(255,255,255,0.05);padding:4px}
.header-sub{font-size:10px;color:#4b5563;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.header-title{font-size:24px;font-weight:700;font-family:'DM Mono',monospace;color:#f1f5f9}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.entry-link{color:#00b4d8;font-family:'DM Mono',monospace;font-size:12px;text-decoration:none;border:1px solid rgba(0,180,216,0.3);border-radius:8px;padding:8px 12px}
.entry-link:hover{background:rgba(0,180,216,0.08)}
.nav-links{display:flex;gap:8px}
.last-refresh{font-size:10px;color:#4b5563}
.date-select{background:rgba(0,180,216,0.1);border:1px solid rgba(0,180,216,0.3);border-radius:8px;padding:8px 12px;color:#00b4d8;font-family:'DM Mono',monospace;font-size:14px;font-weight:700;cursor:pointer;outline:none}
.date-select option{background:#1a1a2e;color:#e2e8f0}
.days-count{font-size:10px;color:#4b5563}
.status-bar{border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.status-bar.green{background:rgba(6,214,160,0.08);border:1px solid rgba(6,214,160,0.25)}
.status-bar.red{background:rgba(255,77,109,0.08);border:1px solid rgba(255,77,109,0.25)}
.status-text{font-size:13px;font-weight:600}
.status-text.green{color:#06d6a0}
.status-text.red{color:#ff4d6d}
.status-sub{font-size:12px;color:#6b7280}
.tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.tab-btn{padding:8px 14px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Mono',monospace;background:rgba(255,255,255,0.05);color:#6b7280;transition:all 0.15s}
.tab-btn.active{color:#0d0d1a}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:16px}
.card-label{font-size:10px;color:#6b7280;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.card-sub{font-size:11px;color:#4b5563;margin-bottom:4px}
.card-value{font-size:20px;font-family:'DM Mono',monospace;font-weight:700}
.card-margin{font-size:11px;color:#6b7280;margin-top:3px}
.waterfall{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:20px;margin-bottom:16px}
.wf-title{font-size:10px;color:#6b7280;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px}
.wf-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.wf-row.bold{padding:11px 0;background:rgba(255,255,255,0.02);border-radius:7px;margin-bottom:3px;padding:11px 10px}
.wf-row.indent{padding-left:18px}
.wf-row.sep{border-top:1px solid rgba(255,255,255,0.1)}
.wf-label{font-size:12px;color:#94a3b8}
.wf-label.bold{font-size:13.5px;color:#e2e8f0;font-weight:700}
.wf-sub{font-size:10px;color:#4b5563;margin-top:1px}
.wf-val{font-size:12.5px;font-family:'DM Mono',monospace;font-weight:500}
.wf-val.bold{font-size:15px;font-weight:700}
.net-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding:15px 16px;border-radius:10px}
.net-row.profit{background:rgba(6,214,160,0.08);border:1px solid rgba(6,214,160,0.3)}
.net-row.loss{background:rgba(255,77,109,0.08);border:1px solid rgba(255,77,109,0.3)}
.net-label{font-size:10px;color:#6b7280;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.net-sub{font-size:11px;color:#4b5563}
.net-val{font-size:26px;font-family:'DM Mono',monospace;font-weight:700}
.plbar{background:#111827;border-radius:6px;height:7px;overflow:hidden;margin-top:8px}
.plbar-fill{height:100%;border-radius:6px;transition:width 1s ease}
.plbar-fill.profit{background:linear-gradient(90deg,#00b4d8,#06d6a0)}
.plbar-fill.loss{background:#ff4d6d}
.boxes{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:13px 16px;flex:1;min-width:120px}
.box-label{font-size:10px;color:#6b7280;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:5px}
.box-val{font-size:19px;font-family:'DM Mono',monospace;font-weight:600}
.box-sub{font-size:11px;color:#6b7280;margin-top:3px}
.sec-label{display:flex;align-items:center;gap:10px;margin:22px 0 12px}
.sec-bar{width:3px;height:26px;border-radius:2px}
.sec-text{font-size:12px;font-family:'DM Mono',monospace;color:#cbd5e1;font-weight:700;letter-spacing:1.2px;text-transform:uppercase}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:6px 9px;color:#6b7280;font-weight:600;font-size:10px;letter-spacing:0.8px;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,0.07);font-family:'DM Mono',monospace}
th:first-child{text-align:left}
th:not(:first-child){text-align:right}
td{padding:7px 9px;border-bottom:1px solid rgba(255,255,255,0.04)}
td:first-child{text-align:left;color:#cbd5e1}
td:not(:first-child){text-align:right;color:#94a3b8;font-family:'DM Mono',monospace}
tr.total-row{border-top:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.03)}
tr.total-row td{font-weight:700;color:#e2e8f0;font-family:'DM Mono',monospace}
.dept-pl{border-radius:12px;padding:16px;margin-top:14px}
.dept-pl.profit{background:rgba(255,255,255,0.03);border:1px solid rgba(6,214,160,0.2)}
.dept-pl.loss{background:rgba(255,255,255,0.03);border:1px solid rgba(255,77,109,0.2)}
.dept-note{font-size:11px;color:#6b7280;margin-bottom:10px;font-style:italic}
.client-breakdown{margin-top:14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:14px}
.cb-title{font-size:10px;color:#6b7280;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:10px}
.cb-cards{display:flex;flex-wrap:wrap;gap:8px}
.cb-card{background:rgba(0,180,216,0.07);border:1px solid rgba(0,180,216,0.15);border-radius:8px;padding:8px 12px}
.cb-name{font-size:10px;color:#6b7280}
.cb-val{font-size:14px;font-family:'DM Mono',monospace;color:#00b4d8;font-weight:600}
.rate-ref{margin-top:12px;padding:10px 14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px}
.rate-ref-title{font-size:10px;color:#6b7280;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.rate-cards{display:flex;gap:10px;flex-wrap:wrap}
.rate-card{background:rgba(249,115,22,0.07);border:1px solid rgba(249,115,22,0.15);border-radius:7px;padding:6px 12px}
.rate-type{font-size:10px;color:#6b7280}
.rate-val{font-size:13px;font-family:'DM Mono',monospace;color:#f97316;font-weight:600}
.print-info{margin-top:14px;padding:14px 16px;background:rgba(251,191,36,0.07);border:1px solid rgba(251,191,36,0.2);border-radius:10px}
.print-note{font-size:12px;color:#94a3b8}
.print-rev{font-size:20px;font-family:'DM Mono',monospace;color:#fbbf24;font-weight:700;margin-top:8px}
.footer{margin-top:32px;font-size:10.5px;color:#374151;text-align:center;padding-bottom:16px}
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;font-size:16px;color:#6b7280;font-family:'DM Mono',monospace}
.error{background:rgba(255,77,109,0.08);border:1px solid rgba(255,77,109,0.25);border-radius:10px;padding:20px;text-align:center;color:#ff4d6d;margin:40px 0}
</style>
</head>
<body>
<div class="container">
  <div id="app"><div class="loading">Loading factory data...</div></div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const REPO   = "nivesh-sudo/greenedge-factory-dashboard";
const BRANCH = "main";
const DATA_URL   = () => `https://raw.githubusercontent.com/${REPO}/${BRANCH}/data.json?t=${Date.now()}`;
const MASTER_URL = () => `https://raw.githubusercontent.com/${REPO}/${BRANCH}/master.json?t=${Date.now()}`;
const REFRESH_MS = 30000;

// ─── STATE ───────────────────────────────────────────────────────────────────
let MASTER={}, PKG_RATES={}, PRINT_RATE=0, H_RATES={}, TUFT_RATE=0, WAGE={}, ELEC={}, FIXED_OH={};
let HISTORICAL={};
let selDate="", activeTab="summary";

// ─── FETCH ───────────────────────────────────────────────────────────────────
let lastRefresh=null;
async function loadData(isBackground){
  try{
    const [mRes,dRes]=await Promise.all([fetch(MASTER_URL()),fetch(DATA_URL())]);
    if(!mRes.ok||!dRes.ok) throw new Error("Failed to fetch data files");
    const mTxt=await mRes.text();
    const dTxt=await dRes.text();
    let mJson,dJson;
    try{mJson=JSON.parse(mTxt);}catch(e){throw new Error("MASTER FAILED: "+e.message);}
    try{dJson=JSON.parse(dTxt);}catch(e){throw new Error("DATA FAILED: "+e.message);}
    MASTER     = mJson.products||{};
    PKG_RATES  = mJson.PKG_RATES||{hanger:0.60,pouch:0.10,loose:0.05,dispenser:0.75};
    PRINT_RATE = mJson.PRINT_RATE||0.10;
    H_RATES    = mJson.H_RATES||{two:56,single:23};
    TUFT_RATE  = mJson.TUFT_RATE||1.4;
    WAGE       = mJson.WAGE||{hr12:880,hr8:450};
    ELEC       = mJson.ELEC||{monthly:1000000,days:30,splits:{H:0.35,V:0.25,T:0.25,Tr:0.15}};
    FIXED_OH   = mJson.FIXED_OH||{staffing:30000,capRepayment:78333,maintenance:16667};
    HISTORICAL = dJson.reports||{};
    const dates=Object.keys(HISTORICAL).sort().reverse();
    if(!selDate||!HISTORICAL[selDate]) selDate=dates[0]||"";
    lastRefresh=new Date();
    render();
  }catch(e){
    if(!isBackground){
      document.getElementById("app").innerHTML=`<div class="error"><b>Could not load data</b><br/>${e.message}<br/><br/>Make sure data.json and master.json exist in your GitHub repo.<br/><br/><small style="color:#6b7280">Check browser console (F12) for details.</small></div>`;
    }
    console.error("Dashboard load error:", e);
  }
}
setInterval(()=>loadData(true), REFRESH_MS);

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const fmt  = n=>`₹${Math.round(n).toLocaleString("en-IN")}`;
const fmtN = n=>Math.round(n).toLocaleString("en-IN");
const k    = (c,m)=>`${c}|${m}`;
const sumObj=o=>Object.values(o).reduce((a,b)=>a+b,0);

function dailyElec(){
  const d=ELEC.monthly/ELEC.days;
  return{H:d*ELEC.splits.H,V:d*ELEC.splits.V,T:d*ELEC.splits.T,Tr:d*ELEC.splits.Tr,total:d};
}
function attNum(v){
  if(typeof v==='number') return v;
  if(v&&typeof v==='object') return sumObj(v); // legacy name-map format
  return 0;
}
function calcLabour(att){
  const m12=attNum(att.moulding.day12)+attNum(att.moulding.night12);
  const m8=attNum(att.moulding.hr8);
  const t12=attNum(att.tufting.day12)+attNum(att.tufting.night12);
  const t8=attNum(att.tufting.hr8);
  const moulding=m12*WAGE.hr12+m8*WAGE.hr8;
  const tufting=t12*WAGE.hr12+t8*WAGE.hr8;
  const checking=att.checking.hr12*WAGE.hr12+att.checking.hr8*WAGE.hr8;
  const pkgDay12=attNum(att.packaging.day12);
  const pkgHr8=attNum(att.packaging.hr8);
  const pkgNight12=attNum(att.packaging.night12);
  const packaging=pkgDay12*WAGE.hr12+pkgHr8*WAGE.hr8+pkgNight12*WAGE.hr12;
  const overhead=att.overhead.cleaning_8hr*WAGE.hr8+att.overhead.store_12hr*WAGE.hr12+att.overhead.qc_12hr*WAGE.hr12;
  return{moulding,tufting,checking,tuftingTotal:tufting+checking,packaging,overhead,
    mW:m12+m8,tW:t12+t8+att.checking.hr12+att.checking.hr8,
    pW:pkgDay12+pkgHr8+pkgNight12,
    oW:att.overhead.cleaning_8hr+att.overhead.store_12hr+att.overhead.qc_12hr};
}
function calcHandles(prod,labourCost){
  const elec=dailyElec();
  let revV=0,revH=0,unitsV=0,unitsH=0;
  const clientRev={};
  const vertRows=(prod.handles.vertical||[]).map(r=>{
    const total=r.day+r.night;
    const m=MASTER[k(r.client,r.model)]||{};
    const kg=(total*(m.w||0))/1000;
    const rev=kg*H_RATES.two;
    revV+=rev;unitsV+=total;
    clientRev[r.client]=(clientRev[r.client]||0)+rev;
    return{...r,total,kg:kg.toFixed(2),rev};
  });
  const horizRows=(prod.handles.horizontal||[]).map(r=>{
    const total=r.day+r.night;
    const m=MASTER[k(r.client,r.model)]||{};
    const kg=(total*(m.w||0))/1000;
    const rev=kg*H_RATES.single;
    revH+=rev;unitsH+=total;
    clientRev[r.client]=(clientRev[r.client]||0)+rev;
    return{...r,total,kg:kg.toFixed(2),rev,anc:m.anc||false};
  });
  const totalRev=revV+revH;
  const totalElec=elec.V+elec.H;
  const gp=totalRev-labourCost-totalElec;
  return{vertRows,horizRows,unitsV,unitsH,totalUnits:unitsV+unitsH,revV,revH,totalRev,labourCost,totalElec,grossProfit:gp,grossMargin:totalRev>0?(gp/totalRev)*100:0,clientRev};
}
function calcPrinting(prod){
  let totalUnits=0,totalRev=0;
  const rows=(prod.printing||[]).map(r=>{
    const total=r.day+r.night;const rev=total*PRINT_RATE;
    totalUnits+=total;totalRev+=rev;
    return{...r,total,rev};
  });
  return{rows,totalUnits,totalRev};
}
function calcTuftTrim(prod,labourCost){
  const elec=dailyElec();
  let tuftUnits=0,tuftRev=0,trimUnits=0;
  const clientRev={};
  const tuftRows=(prod.tufting||[]).map(r=>{
    const total=r.day+r.night;
    const m=MASTER[k(r.client,r.model)]||{};
    const rate=(TUFT_RATE*(m.h||0))/100;
    const rev=total*rate;
    tuftUnits+=total;tuftRev+=rev;
    clientRev[r.client]=(clientRev[r.client]||0)+rev;
    return{...r,total,rate:rate.toFixed(3),rev};
  });
  const trimRows=(prod.trimming||[]).map(r=>{
    const total=r.day+r.night;trimUnits+=total;
    return{...r,total};
  });
  const totalElec=elec.T+elec.Tr;
  const gp=tuftRev-labourCost-totalElec;
  return{tuftRows,trimRows,tuftUnits,trimUnits,totalRev:tuftRev,labourCost,totalElec,grossProfit:gp,grossMargin:tuftRev>0?(gp/tuftRev)*100:0,clientRev};
}
function calcPackaging(prod,labourCost){
  let totalBrushes=0,totalRev=0;
  const clientRev={};
  const sealing=(prod.packaging.sealing||[]).map(r=>{
    const shots=r.day+r.night;const brushes=shots*r.bps;
    const m=MASTER[k(r.client,r.model)]||{};
    const rate=PKG_RATES[m.pkg]||0.60;
    const rev=brushes*rate;
    totalBrushes+=brushes;totalRev+=rev;
    clientRev[r.client]=(clientRev[r.client]||0)+rev;
    return{...r,shots,brushes,type:"Sealing",rate:`₹${rate}`,rev};
  });
  const pouch=(prod.packaging.pouch||[]).map(r=>{
    const pcs=r.day+r.night;const rev=pcs*PKG_RATES.pouch;
    totalBrushes+=pcs;totalRev+=rev;
    clientRev[r.client]=(clientRev[r.client]||0)+rev;
    return{...r,shots:pcs,brushes:pcs,type:"Pouch",rate:"₹0.10",rev};
  });
  const loose=(prod.packaging.loose||[]).map(r=>{
    const pcs=r.day+r.night;const rev=pcs*PKG_RATES.loose;
    totalBrushes+=pcs;totalRev+=rev;
    clientRev[r.client]=(clientRev[r.client]||0)+rev;
    return{...r,shots:pcs,brushes:pcs,type:"Loose",rate:"₹0.05",rev};
  });
  const rows=[...sealing,...pouch,...loose];
  const gp=totalRev-labourCost;
  return{rows,totalBrushes,totalRev,labourCost,grossProfit:gp,grossMargin:totalRev>0?(gp/totalRev)*100:0,clientRev};
}

// ─── HTML BUILDERS ───────────────────────────────────────────────────────────
function plBar(profit,revenue){
  const p=revenue>0?Math.min(100,Math.max(0,(profit/revenue)*100)):0;
  const cls=profit>=0?"profit":"loss";
  return `<div class="plbar"><div class="plbar-fill ${cls}" style="width:${Math.abs(p)}%"></div></div>`;
}
function box(label,value,sub,accent){
  return `<div class="box"><div class="box-label">${label}</div><div class="box-val" style="color:${accent||"#e2e8f0"}">${value}</div>${sub?`<div class="box-sub">${sub}</div>`:""}</div>`;
}
function secLabel(title,color){
  return `<div class="sec-label"><div class="sec-bar" style="background:${color}"></div><div class="sec-text">${title}</div></div>`;
}
function tbl(headers,rows,totals){
  const ths=headers.map((h,i)=>`<th style="text-align:${i===0?"left":"right"}">${h}</th>`).join("");
  const trs=rows.map(row=>`<tr>${row.map((c,j)=>`<td style="text-align:${j===0?"left":"right"}">${c}</td>`).join("")}</tr>`).join("");
  const tot=totals?`<tr class="total-row">${totals.map((c,j)=>`<td style="text-align:${j===0?"left":"right"}">${c}</td>`).join("")}</tr>`:"";
  return `<div class="tbl-wrap"><table><thead><tr>${ths}</tr></thead><tbody>${trs}${tot}</tbody></table></div>`;
}
function deptPL(revenue,labour,elec,profit,margin,workers,note,noElec){
  const cls=profit>=0?"profit":"loss";
  return `<div class="dept-pl ${cls}">
    ${note?`<div class="dept-note">${note}</div>`:""}
    <div class="boxes">
      ${box("Revenue",fmt(revenue),null,"#00b4d8")}
      ${box("Labour",fmt(labour),`${workers} workers`,"#f59e0b")}
      ${noElec?"":box("Electricity",fmt(elec),null,"#a78bfa")}
      ${box(profit>=0?"Gross Profit":"Gross Loss",fmt(Math.abs(profit)),null,profit>=0?"#06d6a0":"#ff4d6d")}
      ${box("Margin",`${margin.toFixed(1)}%`,null,profit>=0?"#06d6a0":"#ff4d6d")}
    </div>
    ${plBar(profit,revenue)}
  </div>`;
}
function clientBreakdown(map,label){
  const entries=Object.entries(map).sort((a,b)=>b[1]-a[1]);
  if(!entries.length) return "";
  return `<div class="client-breakdown">
    <div class="cb-title">${label} — Client Revenue</div>
    <div class="cb-cards">${entries.map(([c,v])=>`<div class="cb-card"><div class="cb-name">${c}</div><div class="cb-val">${fmt(v)}</div></div>`).join("")}</div>
  </div>`;
}

// ─── TAB CONTENT ─────────────────────────────────────────────────────────────
function tabSummary(H,P,TT,PK,L,elec,deptRev,deptGP,fixedOH,netProfit,netMargin,clears){
  const totalElec=elec.total;
  const cards=[
    {label:"Handles",val:H.grossProfit,rev:H.totalRev,m:H.grossMargin,color:"#06d6a0"},
    {label:"Printing",val:P.totalRev,rev:P.totalRev,m:100,color:"#fbbf24",noM:true},
    {label:"Tufting & Trimming",val:TT.grossProfit,rev:TT.totalRev,m:TT.grossMargin,color:"#a78bfa"},
    {label:"Packaging",val:PK.grossProfit,rev:PK.totalRev,m:PK.grossMargin,color:"#f97316"},
  ];
  const wfRows=[
    {label:"Handles Revenue",value:H.totalRev,color:"#00b4d8"},
    {label:"Printing Revenue",value:P.totalRev,color:"#fbbf24"},
    {label:"Tufting & Trimming Revenue",value:TT.totalRev,color:"#a78bfa"},
    {label:"Packaging Revenue",value:PK.totalRev,color:"#f97316"},
    {label:"Total Dept Revenue",value:deptRev,color:"#e2e8f0",bold:true,sep:true},
    {label:"Less: Moulding Labour",value:-L.moulding,color:"#f59e0b",indent:true,sub:`${L.mW} workers`},
    {label:"Less: Tufting+Checking Labour",value:-L.tuftingTotal,color:"#f59e0b",indent:true,sub:`${L.tW} workers`},
    {label:"Less: Packaging Labour",value:-L.packaging,color:"#f59e0b",indent:true,sub:`${L.pW} workers`},
    {label:"Less: Electricity",value:-totalElec,color:"#a78bfa",indent:true},
    {label:"Dept Gross Profit",value:deptGP,color:deptGP>=0?"#06d6a0":"#ff4d6d",bold:true},
    {label:"Less: Overhead Labour",value:-L.overhead,color:"#fb7185",indent:true,sub:`${L.oW} workers`},
    {label:"Less: Staffing",value:-FIXED_OH.staffing,color:"#fb7185",indent:true},
    {label:"Less: Capital Repayment",value:-FIXED_OH.capRepayment,color:"#fb7185",indent:true},
    {label:"Less: Maintenance & Agencies",value:-FIXED_OH.maintenance,color:"#fb7185",indent:true},
  ];
  const wfHTML=wfRows.map(r=>{
    const cls=[r.bold?"bold":"",r.indent?"indent":"",r.sep?"sep":""].filter(Boolean).join(" ");
    const v=r.value<0?`-${fmt(Math.abs(r.value))}`:fmt(r.value);
    return `<div class="wf-row ${cls}">
      <div><div class="wf-label ${r.bold?"bold":""}">${r.label}</div>${r.sub?`<div class="wf-sub">${r.sub}</div>`:""}</div>
      <div class="wf-val ${r.bold?"bold":""}" style="color:${r.color}">${v}</div>
    </div>`;
  }).join("");
  const netCls=netProfit>=0?"profit":"loss";
  const netColor=netProfit>=0?"#06d6a0":"#ff4d6d";
  return `
    <div class="grid2">
      ${cards.map(d=>`<div class="card">
        <div class="card-label">${d.label}</div>
        <div class="card-sub">Revenue: ${fmt(d.rev)}</div>
        <div class="card-value" style="color:${d.color}">${fmt(d.val)}</div>
        ${!d.noM?`<div class="card-margin">${d.m.toFixed(1)}% gross margin</div>`:""}
        ${plBar(d.val,d.rev)}
      </div>`).join("")}
    </div>
    <div class="waterfall">
      <div class="wf-title">Factory P&L Waterfall</div>
      ${wfHTML}
      <div class="net-row ${netCls}">
        <div><div class="net-label">Net ${netProfit>=0?"Profit":"Loss"} — After All Overheads</div><div class="net-sub">Net margin: ${netMargin.toFixed(1)}%</div></div>
        <div class="net-val" style="color:${netColor}">${fmt(Math.abs(netProfit))}</div>
      </div>
      ${plBar(netProfit,deptRev)}
    </div>
    <div class="boxes">
      ${box("Handle Units",fmtN(H.totalUnits),null,"#06d6a0")}
      ${box("Tufting Units",fmtN(TT.tuftUnits),null,"#a78bfa")}
      ${box("Trimming Units",fmtN(TT.trimUnits),null,"#a78bfa")}
      ${box("Pkg Brushes",fmtN(PK.totalBrushes),null,"#f97316")}
      ${box("Total Workers",L.mW+L.tW+L.pW,"production","#f59e0b")}
    </div>`;
}
function tabHandles(H,L){
  return `
    ${secLabel("Vertical — Two Colour (Revenue here)","#00b4d8")}
    ${tbl(["Client","Model","Day","Night","Total","Wt(kg)","Revenue"],
      H.vertRows.map(r=>[r.client,r.model,fmtN(r.day),fmtN(r.night),fmtN(r.total),r.kg,fmt(r.rev)]),
      ["Total","","","",fmtN(H.unitsV),"",fmt(H.revV)])}
    ${secLabel("Horizontal — Single Colour / Ancillary","#06d6a0")}
    <div style="font-size:11px;color:#6b7280;margin-bottom:8px;font-style:italic">Two-colour products also run on H but revenue counted on V only.</div>
    ${tbl(["Client","Model","Day","Night","Total","Wt(kg)","Revenue"],
      H.horizRows.map(r=>[r.client,r.model,fmtN(r.day),fmtN(r.night),fmtN(r.total),r.kg,r.anc?`${fmt(r.rev)} (stock)`:fmt(r.rev)]),
      ["Total","","","",fmtN(H.unitsH),"",fmt(H.revH)])}
    ${deptPL(H.totalRev,H.labourCost,H.totalElec,H.grossProfit,H.grossMargin,L.mW)}
    ${clientBreakdown(H.clientRev,"Handles")}`;
}
function tabPrinting(P){
  return `
    ${secLabel("Handle Printing — ₹0.10/brush","#fbbf24")}
    ${tbl(["Client","Model","Day","Night","Total","Revenue"],
      P.rows.map(r=>[r.client,r.model,fmtN(r.day),fmtN(r.night),fmtN(r.total),fmt(r.rev)]),
      ["Total","","","",fmtN(P.totalUnits),fmt(P.totalRev)])}
    <div class="print-info">
      <div class="print-note">Labour included in Moulding — no separate deduction.</div>
      <div class="print-rev">${fmt(P.totalRev)} pure revenue</div>
    </div>`;
}
function tabTuftTrim(TT,L){
  return `
    ${secLabel("Tufting","#a78bfa")}
    ${tbl(["Client","Model","Day","Night","Total","Rate/pc","Revenue"],
      TT.tuftRows.map(r=>[r.client,r.model,fmtN(r.day),fmtN(r.night),fmtN(r.total),`₹${r.rate}`,fmt(r.rev)]),
      ["Total","","","",fmtN(TT.tuftUnits),"",fmt(TT.totalRev)])}
    ${secLabel("Trimming — included in tufting charge","#f59e0b")}
    ${tbl(["Client","Model","Day","Night","Total"],
      TT.trimRows.map(r=>[r.client,r.model,fmtN(r.day),fmtN(r.night),fmtN(r.total)]),
      ["Total","","","",fmtN(TT.trimUnits)])}
    ${deptPL(TT.totalRev,TT.labourCost,TT.totalElec,TT.grossProfit,TT.grossMargin,L.tW,"Standard rates apply to all clients including home brands.")}
    ${clientBreakdown(TT.clientRev,"Tufting & Trimming")}`;
}
function tabPackaging(PK,L){
  return `
    ${secLabel("Packaging — All Types","#f97316")}
    ${tbl(["Client","Model","Type","Shots/Pcs","Brushes","Rate","Revenue"],
      PK.rows.map(r=>[r.client,r.model,r.type,fmtN(r.shots),fmtN(r.brushes),r.rate,fmt(r.rev)]),
      ["Total","","","",fmtN(PK.totalBrushes),"",fmt(PK.totalRev)])}
    <div class="rate-ref">
      <div class="rate-ref-title">Rate Reference</div>
      <div class="rate-cards">
        ${[["Hanger","₹0.60"],["Dispenser","₹0.75"],["Pouch","₹0.10"],["Loose","₹0.05"]].map(([t,r])=>`<div class="rate-card"><div class="rate-type">${t}</div><div class="rate-val">${r}/brush</div></div>`).join("")}
      </div>
    </div>
    ${deptPL(PK.totalRev,PK.labourCost,0,PK.grossProfit,PK.grossMargin,L.pW,"",true)}
    ${clientBreakdown(PK.clientRev,"Packaging")}`;
}
function tabClients(H,TT,PK,deptRev){
  const allClientRev={};
  [H.clientRev,TT.clientRev,PK.clientRev].forEach(m=>Object.entries(m).forEach(([c,v])=>{allClientRev[c]=(allClientRev[c]||0)+v;}));
  const sorted=Object.keys(allClientRev).sort((a,b)=>allClientRev[b]-allClientRev[a]);
  return `
    ${secLabel("Client-wise Revenue — All Departments","#fb7185")}
    ${tbl(["Client","Handles","Tufting/Trim","Packaging","Total"],
      sorted.map(c=>[c,fmt(H.clientRev[c]||0),fmt(TT.clientRev[c]||0),fmt(PK.clientRev[c]||0),fmt(allClientRev[c])]),
      ["Total",fmt(H.totalRev),fmt(TT.totalRev),fmt(PK.totalRev),fmt(deptRev)])}`;
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
function render(){
  const dates=Object.keys(HISTORICAL).sort().reverse();
  if(!dates.length){
    document.getElementById("app").innerHTML=`<div class="error">No production data found in data.json yet. Use <a href="entry.html" style="color:#ff4d6d">Enter Today's Data</a> to submit the first day's numbers.</div>`;
    return;
  }
  if(!selDate||!HISTORICAL[selDate]) selDate=dates[0];
  const {prod,att}=HISTORICAL[selDate];
  const L=calcLabour(att);
  const H=calcHandles(prod,L.moulding);
  const P=calcPrinting(prod);
  const TT=calcTuftTrim(prod,L.tuftingTotal);
  const PK=calcPackaging(prod,L.packaging);
  const elec=dailyElec();
  const deptRev=H.totalRev+P.totalRev+TT.totalRev+PK.totalRev;
  const deptGP=H.grossProfit+TT.grossProfit+PK.grossProfit;
  const fixedOH=FIXED_OH.staffing+FIXED_OH.capRepayment+FIXED_OH.maintenance;
  const netProfit=deptGP-L.overhead-fixedOH;
  const netMargin=deptRev>0?(netProfit/deptRev)*100:0;
  const clears=deptGP>=(L.overhead+fixedOH);
  const tabs=[
    {id:"summary",label:"Factory P&L",color:"#00b4d8"},
    {id:"handles",label:"Handles",color:"#06d6a0"},
    {id:"printing",label:"Printing",color:"#fbbf24"},
    {id:"tufttrim",label:"Tufting & Trimming",color:"#a78bfa"},
    {id:"packaging",label:"Packaging",color:"#f97316"},
    {id:"clients",label:"Client View",color:"#fb7185"},
  ];
  let tabContent="";
  if(activeTab==="summary") tabContent=tabSummary(H,P,TT,PK,L,elec,deptRev,deptGP,fixedOH,netProfit,netMargin,clears);
  else if(activeTab==="handles") tabContent=tabHandles(H,L);
  else if(activeTab==="printing") tabContent=tabPrinting(P);
  else if(activeTab==="tufttrim") tabContent=tabTuftTrim(TT,L);
  else if(activeTab==="packaging") tabContent=tabPackaging(PK,L);
  else if(activeTab==="clients") tabContent=tabClients(H,TT,PK,deptRev);

  const html=`
    <div class="header">
      <div class="header-left">
        <div>
          <div class="header-sub">Greenedge Ventures — Factory</div>
          <div class="header-title mono">Daily P&L Dashboard</div>
        </div>
        <div class="nav-links">
          <a class="entry-link" href="entry.html">+ Enter Today's Data</a>
          <a class="entry-link" href="reports.html">Reports →</a>
        </div>
      </div>
      <div class="header-right">
        <select class="date-select" onchange="changeDate(this.value)">
          ${dates.map(d=>`<option value="${d}"${d===selDate?" selected":""}>${d}</option>`).join("")}
        </select>
        <div class="days-count">${dates.length} days on record</div>
        <div class="last-refresh">${lastRefresh?`Updated ${lastRefresh.toLocaleTimeString("en-IN")} · auto-refreshes every 30s`:""}</div>
      </div>
    </div>
    <div class="status-bar ${clears?"green":"red"}">
      <div class="status-text ${clears?"green":"red"}">${clears?"✅ Gross profit cleared all fixed costs today":"⚠️ Gross profit did NOT clear fixed costs today"}</div>
      <div class="status-sub">Fixed burden: ${fmt(L.overhead+fixedOH)}/day</div>
    </div>
    <div class="tabs">
      ${tabs.map(t=>`<button class="tab-btn${activeTab===t.id?" active":""}" style="${activeTab===t.id?`background:${t.color}`:"background:rgba(255,255,255,0.05)"}" onclick="changeTab('${t.id}')">${t.label}</button>`).join("")}
    </div>
    <div id="tab-content">${tabContent}</div>
    <div class="footer">Labour from attendance • Electricity ₹10L/month • Staffing ₹30k/day • Capital Repayment ₹78,333/day • Maintenance ₹16,667/day</div>
  `;
  document.getElementById("app").innerHTML=html;
}

function changeDate(d){selDate=d;activeTab="summary";render();}
function changeTab(t){activeTab=t;render();}

// ─── INIT ────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
