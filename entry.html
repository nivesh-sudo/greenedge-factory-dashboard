<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Greenedge Ventures — Daily Data Entry</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;color:#e2e8f0;font-family:'Inter','Segoe UI',sans-serif;min-height:100vh;padding:22px 14px}
.mono{font-family:'DM Mono',monospace}
.container{max-width:820px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:12px}
.header-sub{font-size:10px;color:#4b5563;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.header-title{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;color:#f1f5f9}
.dash-link{color:#00b4d8;font-family:'DM Mono',monospace;font-size:12px;text-decoration:none;border:1px solid rgba(0,180,216,0.3);border-radius:8px;padding:8px 12px;height:fit-content}
.dash-link:hover{background:rgba(0,180,216,0.08)}
.entry-bar{display:flex;gap:14px;flex-wrap:wrap;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 16px;margin-bottom:16px}
.entry-field{display:flex;flex-direction:column;gap:5px}
.entry-field label{font-size:10px;color:#6b7280;letter-spacing:1px;text-transform:uppercase}
.entry-field input{background:#111827;border:1px solid rgba(255,255,255,0.12);border-radius:7px;padding:8px 10px;color:#e2e8f0;font-family:'DM Mono',monospace;font-size:13px;outline:none}
.entry-field input:focus{border-color:#00b4d8}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab-btn{padding:8px 14px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Mono',monospace;background:rgba(255,255,255,0.05);color:#6b7280;transition:all 0.15s}
.tab-btn.active{color:#0d0d1a}
.status-msg{border-radius:10px;padding:11px 15px;margin-bottom:14px;font-size:12.5px;font-family:'DM Mono',monospace}
.status-msg.ok{background:rgba(6,214,160,0.1);border:1px solid rgba(6,214,160,0.3);color:#06d6a0}
.status-msg.err{background:rgba(255,77,109,0.1);border:1px solid rgba(255,77,109,0.3);color:#ff4d6d}
.status-msg.info{background:rgba(0,180,216,0.1);border:1px solid rgba(0,180,216,0.3);color:#00b4d8}
.sec-label{margin:20px 0 8px}
.sec-text{font-size:11px;font-family:'DM Mono',monospace;color:#cbd5e1;font-weight:700;letter-spacing:1.2px;text-transform:uppercase}
.add-row-form{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px;margin-bottom:6px}
.add-row-form select,.add-row-form input{background:#111827;border:1px solid rgba(255,255,255,0.12);border-radius:7px;padding:8px 10px;color:#e2e8f0;font-family:'DM Mono',monospace;font-size:12.5px;outline:none}
.add-row-form select:focus,.add-row-form input:focus{border-color:#00b4d8}
.add-row-form input[type=number]{width:100px}
.new-toggle{display:flex;align-items:center;gap:7px;font-size:11.5px;color:#94a3b8;width:100%;margin-bottom:2px;cursor:pointer}
.new-toggle input{width:auto;cursor:pointer}
.existing-fields,.new-fields{display:flex;gap:8px;flex-wrap:wrap}
.add-btn{background:#00b4d8;color:#0d0d1a;border:none;border-radius:7px;padding:9px 14px;font-weight:700;font-size:12px;cursor:pointer;font-family:'DM Mono',monospace}
.add-btn.small{padding:8px 12px}
.hint-text{font-size:11px;color:#6b7280;margin-bottom:10px;font-style:italic}
.empty-note{font-size:11.5px;color:#4b5563;padding:8px 2px}
.tbl-wrap{overflow-x:auto;margin-bottom:6px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:6px 9px;color:#6b7280;font-weight:600;font-size:10px;letter-spacing:0.8px;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,0.07);font-family:'DM Mono',monospace;text-align:right}
th:first-child{text-align:left}
td{padding:7px 9px;border-bottom:1px solid rgba(255,255,255,0.04);text-align:right;color:#94a3b8;font-family:'DM Mono',monospace}
td:first-child{text-align:left;color:#cbd5e1;font-family:'Inter',sans-serif}
td:nth-child(2){text-align:left;color:#cbd5e1;font-family:'Inter',sans-serif}
.rm-btn{background:rgba(255,77,109,0.12);color:#ff4d6d;border:1px solid rgba(255,77,109,0.25);border-radius:6px;width:24px;height:24px;cursor:pointer;font-size:14px;line-height:1}
.submit-btn{display:block;width:100%;border:none;border-radius:10px;padding:13px;font-weight:700;font-size:13px;color:#0d0d1a;cursor:pointer;font-family:'DM Mono',monospace;margin-top:18px;letter-spacing:0.5px}
.chip-row{display:flex;gap:8px;margin-bottom:8px}
.chip-row input{flex:1;background:#111827;border:1px solid rgba(255,255,255,0.12);border-radius:7px;padding:8px 10px;color:#e2e8f0;font-family:'Inter',sans-serif;font-size:13px;outline:none}
.chip-row input:focus{border-color:#00b4d8}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.chip{background:rgba(0,180,216,0.1);border:1px solid rgba(0,180,216,0.25);border-radius:20px;padding:5px 6px 5px 12px;font-size:12px;color:#e2e8f0;display:flex;align-items:center;gap:6px}
.chip button{background:none;border:none;color:#ff4d6d;cursor:pointer;font-size:14px;width:18px;height:18px;border-radius:50%}
.chip button:hover{background:rgba(255,77,109,0.15)}
.count-row{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:9px;padding:9px 13px;margin-bottom:6px}
.count-row label{font-size:12.5px;color:#94a3b8}
.count-row input{width:80px;background:#111827;border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:6px 8px;color:#e2e8f0;font-family:'DM Mono',monospace;font-size:13px;text-align:right;outline:none}
.count-row input:focus{border-color:#00b4d8}
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;font-size:16px;color:#6b7280;font-family:'DM Mono',monospace}
.error{background:rgba(255,77,109,0.08);border:1px solid rgba(255,77,109,0.25);border-radius:10px;padding:20px;text-align:center;color:#ff4d6d;margin:40px 0}
.footer{margin-top:28px;font-size:10.5px;color:#374151;text-align:center;padding-bottom:16px}
</style>
</head>
<body>
<div class="container">
  <div id="app"><div class="loading">Loading form...</div></div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const REPO   = "nivesh-sudo/greenedge-factory-dashboard";
const BRANCH = "main";
const MASTER_URL = () => `https://raw.githubusercontent.com/${REPO}/${BRANCH}/master.json?t=${Date.now()}`;

// ─── STATE ───────────────────────────────────────────────────────────────────
let MASTER={}, CLIENTS=[], MODELS_BY_CLIENT={};
let activeTab="handles";
let selDate=todayStr();
let pin=localStorage.getItem("supervisorPin")||"";
let statusMsg=null;

let state=freshState();
function freshState(){
  return {
    handles:{vertical:[],horizontal:[]},
    printing:[],
    tufting:[],
    trimming:[],
    packaging:{sealing:[],pouch:[],loose:[]},
    attendance:{
      moulding:{day12:[],night12:[],hr8:[]},
      tufting:{day12:[],night12:[],hr8:[]},
      checking:{hr12:0,hr8:0},
      packaging:{day12:0,hr8:0,night12:0},
      overhead:{cleaning_8hr:0,store_12hr:0,qc_12hr:0}
    }
  };
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function todayStr(){
  const d=new Date();
  return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10);
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function val(id){const el=document.getElementById(id);return el?el.value:"";}
function numVal(id){const v=parseFloat(val(id));return isNaN(v)||v<0?0:v;}
function setStatus(type,text){statusMsg={type,text};}

// ─── FETCH MASTER ────────────────────────────────────────────────────────────
async function loadMaster(){
  try{
    const res=await fetch(MASTER_URL());
    if(!res.ok) throw new Error("HTTP "+res.status);
    const json=await res.json();
    MASTER=json.products||{};
    CLIENTS=[];MODELS_BY_CLIENT={};
    Object.keys(MASTER).sort().forEach(key=>{
      const idx=key.indexOf("|");
      const c=key.slice(0,idx), m=key.slice(idx+1);
      if(!MODELS_BY_CLIENT[c]){MODELS_BY_CLIENT[c]=[];CLIENTS.push(c);}
      MODELS_BY_CLIENT[c].push(m);
    });
    CLIENTS.sort();
    render();
  }catch(e){
    document.getElementById("app").innerHTML=`<div class="error"><b>Could not load master.json</b><br/>${esc(e.message)}</div>`;
  }
}

// ─── DROPDOWN OPTIONS ────────────────────────────────────────────────────────
function clientOptionsHTML(selected){
  return `<option value="">Client…</option>`+CLIENTS.map(c=>`<option value="${esc(c)}"${c===selected?" selected":""}>${esc(c)}</option>`).join("");
}
function modelOptionsHTML(client,selected){
  const models=(MODELS_BY_CLIENT[client]||[]).slice().sort();
  return `<option value="">Model…</option>`+models.map(m=>`<option value="${esc(m)}"${m===selected?" selected":""}>${esc(m)}</option>`).join("");
}
function toggleNewModel(prefix){
  const isNew=document.getElementById(prefix+"-new").checked;
  const existingWrap=document.getElementById(prefix+"-existing-fields");
  const newWrap=document.getElementById(prefix+"-new-fields");
  if(existingWrap) existingWrap.style.display=isNew?"none":"";
  if(newWrap) newWrap.style.display=isNew?"":"none";
  if(prefix==="pk"){
    const hint=document.getElementById("pk-hint");
    const bpsWrap=document.getElementById("pk-bps-wrap");
    if(hint) hint.style.display=isNew?"none":"";
    if(bpsWrap&&isNew) bpsWrap.style.display="none";
  }
}
function onNewPkgChange(){
  const pkg=val("pk-new-pkg");
  const wrap=document.getElementById("pk-new-bps-wrap");
  if(wrap) wrap.style.display=(pkg==="hanger"||pkg==="dispenser")?"":"none";
}
async function registerNewProduct(client,model,fields){
  const res=await fetch("/api/add-product",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({pin,client,model,fields})
  });
  const json=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(json.error||`HTTP ${res.status}`);
  return json.product||fields;
}
function mergeIntoMaster(client,model,product){
  const key=client+"|"+model;
  MASTER[key]=Object.assign({},MASTER[key]||{},product);
  if(!MODELS_BY_CLIENT[client]){MODELS_BY_CLIENT[client]=[];CLIENTS.push(client);CLIENTS.sort();}
  if(!MODELS_BY_CLIENT[client].includes(model)){MODELS_BY_CLIENT[client].push(model);MODELS_BY_CLIENT[client].sort();}
}
function onClientChange(prefix){
  const client=val(prefix+"-client");
  const modelEl=document.getElementById(prefix+"-model");
  if(modelEl) modelEl.innerHTML=modelOptionsHTML(client);
  if(prefix==="pk") onModelChange("pk");
}
function onModelChange(prefix){
  if(prefix!=="pk") return;
  const client=val("pk-client"), model=val("pk-model");
  const prod=MASTER[client+"|"+model]||{};
  const hint=document.getElementById("pk-hint");
  const bpsWrap=document.getElementById("pk-bps-wrap");
  if(!hint||!bpsWrap) return;
  if(!client||!model){
    bpsWrap.style.display="none";
    hint.textContent="Pick a client and model to see the packaging category.";
  }else if(prod.pkg==="hanger"||prod.pkg==="dispenser"){
    bpsWrap.style.display="";
    document.getElementById("pk-bps").value=prod.bps||"";
    hint.textContent=`Category: Sealing (${prod.pkg}) — enter shots, brushes = shots × BPS.`;
  }else if(prod.pkg==="pouch"){
    bpsWrap.style.display="none";
    hint.textContent="Category: Pouch — enter pieces.";
  }else if(prod.pkg==="loose"){
    bpsWrap.style.display="none";
    hint.textContent="Category: Loose — enter pieces.";
  }else{
    bpsWrap.style.display="none";
    hint.textContent="This model has no packaging type set in master.json.";
  }
}

// ─── ROW TABLES ──────────────────────────────────────────────────────────────
function rowsTable(rows,path){
  if(!rows.length) return `<div class="empty-note">No rows added yet.</div>`;
  const pathStr=JSON.stringify(path);
  return `<div class="tbl-wrap"><table><thead><tr><th>Client</th><th>Model</th><th>Day</th><th>Night</th><th></th></tr></thead><tbody>
    ${rows.map((r,i)=>`<tr><td>${esc(r.client)}</td><td>${esc(r.model)}</td><td>${r.day}</td><td>${r.night}</td><td><button class="rm-btn" onclick='removeRow(${pathStr},${i})'>×</button></td></tr>`).join("")}
  </tbody></table></div>`;
}
function rowsTableBps(rows,path){
  if(!rows.length) return `<div class="empty-note">No rows added yet.</div>`;
  const pathStr=JSON.stringify(path);
  return `<div class="tbl-wrap"><table><thead><tr><th>Client</th><th>Model</th><th>Day</th><th>Night</th><th>BPS</th><th></th></tr></thead><tbody>
    ${rows.map((r,i)=>`<tr><td>${esc(r.client)}</td><td>${esc(r.model)}</td><td>${r.day}</td><td>${r.night}</td><td>${r.bps}</td><td><button class="rm-btn" onclick='removeRow(${pathStr},${i})'>×</button></td></tr>`).join("")}
  </tbody></table></div>`;
}
function removeRow(path,idx){
  let obj=state;
  for(let i=0;i<path.length-1;i++) obj=obj[path[i]];
  obj[path[path.length-1]].splice(idx,1);
  render();
}
function secLabel(title){return `<div class="sec-label"><div class="sec-text">${title}</div></div>`;}

// ─── TAB: HANDLES ────────────────────────────────────────────────────────────
function tabHandles(){
  return `
    <div class="add-row-form">
      <label class="new-toggle"><input type="checkbox" id="h-new" onchange="toggleNewModel('h')"/> New model (not in list yet)</label>
      <span id="h-existing-fields" class="existing-fields">
        <select id="h-client" onchange="onClientChange('h')">${clientOptionsHTML()}</select>
        <select id="h-model">${modelOptionsHTML(val("h-client"))}</select>
      </span>
      <span id="h-new-fields" class="new-fields" style="display:none">
        <input id="h-client-new" type="text" list="clients-datalist" placeholder="New client name"/>
        <input id="h-model-new" type="text" placeholder="New model name"/>
        <input id="h-new-w" type="number" min="0" step="0.01" placeholder="Weight (g/unit)"/>
      </span>
      <input id="h-day" type="number" min="0" placeholder="Day qty"/>
      <input id="h-night" type="number" min="0" placeholder="Night qty"/>
      <select id="h-cat">
        <option value="">Auto-detect category</option>
        <option value="vertical">Vertical (Two Colour)</option>
        <option value="horizontal">Horizontal (Single/Ancillary)</option>
      </select>
      <button class="add-btn" onclick="addHandleRow()">+ Add</button>
    </div>
    <div class="hint-text">New model? Tick the box, type the client and model name, pick Vertical/Horizontal and enter the weight per unit — that's what drives Handles revenue.</div>
    ${secLabel("Vertical — Two Colour")}
    ${rowsTable(state.handles.vertical,["handles","vertical"])}
    ${secLabel("Horizontal — Single Colour / Ancillary")}
    ${rowsTable(state.handles.horizontal,["handles","horizontal"])}
    <button class="submit-btn" style="background:#06d6a0" onclick="submitSection('handles')">Submit Handles Data</button>
  `;
}
async function addHandleRow(){
  const isNew=document.getElementById("h-new").checked;
  const cat=val("h-cat");
  let client,model;
  if(isNew){
    client=val("h-client-new").trim();
    model=val("h-model-new").trim();
    const w=numVal("h-new-w");
    if(!client||!model){alert("Enter a client and model name.");return;}
    if(cat!=="vertical"&&cat!=="horizontal"){alert("Pick Vertical or Horizontal for this new model.");return;}
    if(!w){alert("Enter the weight per unit (grams) — needed to calculate Handles revenue.");return;}
    try{
      const product=await registerNewProduct(client,model,{m:cat==="vertical"?"two":"single",w});
      mergeIntoMaster(client,model,product);
    }catch(e){alert("Could not save new model: "+e.message);return;}
  }else{
    client=val("h-client");model=val("h-model");
    if(!client||!model){alert("Pick a client and model.");return;}
  }
  const day=numVal("h-day"), night=numVal("h-night");
  if(day===0&&night===0){alert("Enter a day or night quantity.");return;}
  const prod=MASTER[client+"|"+model]||{};
  let useCat=cat;
  if(!useCat) useCat=prod.m==="single"?"horizontal":"vertical";
  state.handles[useCat].push({client,model,day,night});
  render();
}

// ─── TAB: PRINTING / TUFTING / TRIMMING ─────────────────────────────────────
function tabSimpleRows(section,label,note,color){
  const deptField=section==="tufting"
    ? `<input id="tufting-new-h" type="number" min="0" step="0.1" placeholder="Height (cm)"/>`
    : "";
  const newModelNote=section==="tufting"
    ? "New model? Tick the box, type the client and model name, and enter the height in cm — that's what drives Tufting revenue."
    : "New model? Tick the box and type the client and model name — no extra numbers needed here.";
  return `
    <div class="add-row-form">
      <label class="new-toggle"><input type="checkbox" id="${section}-new" onchange="toggleNewModel('${section}')"/> New model (not in list yet)</label>
      <span id="${section}-existing-fields" class="existing-fields">
        <select id="${section}-client" onchange="onClientChange('${section}')">${clientOptionsHTML()}</select>
        <select id="${section}-model">${modelOptionsHTML(val(section+"-client"))}</select>
      </span>
      <span id="${section}-new-fields" class="new-fields" style="display:none">
        <input id="${section}-client-new" type="text" list="clients-datalist" placeholder="New client name"/>
        <input id="${section}-model-new" type="text" placeholder="New model name"/>
        ${deptField}
      </span>
      <input id="${section}-day" type="number" min="0" placeholder="Day qty"/>
      <input id="${section}-night" type="number" min="0" placeholder="Night qty"/>
      <button class="add-btn" onclick="addSimpleRow('${section}')">+ Add</button>
    </div>
    <div class="hint-text">${newModelNote}${note?` ${note}`:""}</div>
    ${rowsTable(state[section],[section])}
    <button class="submit-btn" style="background:${color}" onclick="submitSection('${section}')">Submit ${label} Data</button>
  `;
}
async function addSimpleRow(section){
  const isNew=document.getElementById(section+"-new").checked;
  let client,model;
  if(isNew){
    client=val(section+"-client-new").trim();
    model=val(section+"-model-new").trim();
    if(!client||!model){alert("Enter a client and model name.");return;}
    const fields={};
    if(section==="tufting"){
      const h=numVal("tufting-new-h");
      if(!h){alert("Enter the model height (cm) — needed to calculate Tufting revenue.");return;}
      fields.h=h;
    }
    try{
      const product=await registerNewProduct(client,model,fields);
      mergeIntoMaster(client,model,product);
    }catch(e){alert("Could not save new model: "+e.message);return;}
  }else{
    client=val(section+"-client");model=val(section+"-model");
    if(!client||!model){alert("Pick a client and model.");return;}
  }
  const day=numVal(section+"-day"), night=numVal(section+"-night");
  if(day===0&&night===0){alert("Enter a day or night quantity.");return;}
  state[section].push({client,model,day,night});
  render();
}

// ─── TAB: PACKAGING ──────────────────────────────────────────────────────────
function tabPackaging(){
  return `
    <div class="add-row-form">
      <label class="new-toggle"><input type="checkbox" id="pk-new" onchange="toggleNewModel('pk')"/> New model (not in list yet)</label>
      <span id="pk-existing-fields" class="existing-fields">
        <select id="pk-client" onchange="onClientChange('pk')">${clientOptionsHTML()}</select>
        <select id="pk-model" onchange="onModelChange('pk')">${modelOptionsHTML(val("pk-client"))}</select>
      </span>
      <span id="pk-new-fields" class="new-fields" style="display:none">
        <input id="pk-client-new" type="text" list="clients-datalist" placeholder="New client name"/>
        <input id="pk-model-new" type="text" placeholder="New model name"/>
        <select id="pk-new-pkg" onchange="onNewPkgChange()">
          <option value="">Packaging type…</option>
          <option value="hanger">Hanger</option>
          <option value="dispenser">Dispenser</option>
          <option value="pouch">Pouch</option>
          <option value="loose">Loose</option>
        </select>
        <div id="pk-new-bps-wrap" style="display:none"><input id="pk-new-bps" type="number" min="0" step="0.01" placeholder="BPS"/></div>
      </span>
      <input id="pk-day" type="number" min="0" placeholder="Day qty"/>
      <input id="pk-night" type="number" min="0" placeholder="Night qty"/>
      <div id="pk-bps-wrap" style="display:none"><input id="pk-bps" type="number" min="0" step="0.01" placeholder="BPS"/></div>
      <button class="add-btn" onclick="addPackagingRow()">+ Add</button>
    </div>
    <div id="pk-hint" class="hint-text">Pick a client and model to see the packaging category.</div>
    <div class="hint-text">New model? Tick the box, type the client and model name, and pick the packaging type — Hanger/Dispenser also need BPS (brushes per shot).</div>
    ${secLabel("Sealing — Hanger / Dispenser")}
    ${rowsTableBps(state.packaging.sealing,["packaging","sealing"])}
    ${secLabel("Pouch")}
    ${rowsTable(state.packaging.pouch,["packaging","pouch"])}
    ${secLabel("Loose")}
    ${rowsTable(state.packaging.loose,["packaging","loose"])}
    <button class="submit-btn" style="background:#f97316" onclick="submitSection('packaging')">Submit Packaging Data</button>
  `;
}
async function addPackagingRow(){
  const isNew=document.getElementById("pk-new").checked;
  let client,model,prod;
  if(isNew){
    client=val("pk-client-new").trim();
    model=val("pk-model-new").trim();
    const pkg=val("pk-new-pkg");
    if(!client||!model){alert("Enter a client and model name.");return;}
    if(!pkg){alert("Pick a packaging type for this new model.");return;}
    const fields={pkg};
    if(pkg==="hanger"||pkg==="dispenser"){
      const bps=numVal("pk-new-bps");
      if(!bps){alert("Enter BPS (brushes per shot) for this packaging type.");return;}
      fields.bps=bps;
    }
    try{
      const product=await registerNewProduct(client,model,fields);
      mergeIntoMaster(client,model,product);
    }catch(e){alert("Could not save new model: "+e.message);return;}
    prod=MASTER[client+"|"+model];
  }else{
    client=val("pk-client");model=val("pk-model");
    if(!client||!model){alert("Pick a client and model.");return;}
    prod=MASTER[client+"|"+model]||{};
  }
  const day=numVal("pk-day"), night=numVal("pk-night");
  if(day===0&&night===0){alert("Enter a day or night quantity.");return;}
  if(prod.pkg==="hanger"||prod.pkg==="dispenser"){
    const bps=numVal("pk-bps")||prod.bps||0;
    state.packaging.sealing.push({client,model,day,night,bps});
  }else if(prod.pkg==="pouch"){
    state.packaging.pouch.push({client,model,day,night});
  }else if(prod.pkg==="loose"){
    state.packaging.loose.push({client,model,day,night});
  }else{
    alert("This model has no packaging type set.");return;
  }
  render();
}

// ─── TAB: ATTENDANCE ─────────────────────────────────────────────────────────
function chipInput(prefix,names,path){
  const pathStr=JSON.stringify(path);
  return `<div class="chip-row">
    <input id="${prefix}-name" type="text" placeholder="Worker name" onkeydown="if(event.key==='Enter'){event.preventDefault();addChip('${prefix}',${pathStr});}"/>
    <button class="add-btn small" onclick="addChip('${prefix}',${pathStr})">+ Add</button>
  </div>
  <div class="chips">
    ${names.length?names.map((n,i)=>`<span class="chip">${esc(n)}<button onclick='removeChipAt(${pathStr},${i})'>×</button></span>`).join(""):`<span class="empty-note">No workers added</span>`}
  </div>`;
}
function addChip(prefix,path){
  const name=val(prefix+"-name").trim();
  if(!name) return;
  let obj=state;
  for(const p of path) obj=obj[p];
  obj.push(name);
  render();
  const el=document.getElementById(prefix+"-name");
  if(el) el.focus();
}
function removeChipAt(path,idx){
  let obj=state;
  for(const p of path) obj=obj[p];
  obj.splice(idx,1);
  render();
}
function countInput(id,label,value,path){
  const pathStr=JSON.stringify(path);
  return `<div class="count-row"><label>${label}</label><input id="${id}" type="number" min="0" value="${value}" onchange="setCount('${id}',${pathStr})"/></div>`;
}
function setCount(id,path){
  const v=numVal(id);
  let obj=state;
  for(let i=0;i<path.length-1;i++) obj=obj[path[i]];
  obj[path[path.length-1]]=v;
}
function tabAttendance(){
  const A=state.attendance;
  return `
    ${secLabel("Moulding — 12hr Day Shift")}
    ${chipInput("mould-day12",A.moulding.day12,["attendance","moulding","day12"])}
    ${secLabel("Moulding — 12hr Night Shift")}
    ${chipInput("mould-night12",A.moulding.night12,["attendance","moulding","night12"])}
    ${secLabel("Moulding — 8hr Shift")}
    ${chipInput("mould-hr8",A.moulding.hr8,["attendance","moulding","hr8"])}
    ${secLabel("Tufting — 12hr Day Shift")}
    ${chipInput("tuft-day12",A.tufting.day12,["attendance","tufting","day12"])}
    ${secLabel("Tufting — 12hr Night Shift")}
    ${chipInput("tuft-night12",A.tufting.night12,["attendance","tufting","night12"])}
    ${secLabel("Tufting — 8hr Shift")}
    ${chipInput("tuft-hr8",A.tufting.hr8,["attendance","tufting","hr8"])}
    ${secLabel("Checking")}
    ${countInput("checking-hr12","12hr shift workers",A.checking.hr12,["attendance","checking","hr12"])}
    ${countInput("checking-hr8","8hr shift workers",A.checking.hr8,["attendance","checking","hr8"])}
    ${secLabel("Packaging Attendance")}
    ${countInput("pkgatt-day12","12hr day shift workers",A.packaging.day12,["attendance","packaging","day12"])}
    ${countInput("pkgatt-hr8","8hr shift workers",A.packaging.hr8,["attendance","packaging","hr8"])}
    ${countInput("pkgatt-night12","12hr night shift workers",A.packaging.night12,["attendance","packaging","night12"])}
    ${secLabel("Overhead")}
    ${countInput("oh-clean","Cleaning (8hr) workers",A.overhead.cleaning_8hr,["attendance","overhead","cleaning_8hr"])}
    ${countInput("oh-store","Store (12hr) workers",A.overhead.store_12hr,["attendance","overhead","store_12hr"])}
    ${countInput("oh-qc","QC (12hr) workers",A.overhead.qc_12hr,["attendance","overhead","qc_12hr"])}
    <button class="submit-btn" style="background:#fb7185" onclick="submitSection('attendance')">Submit Attendance Data</button>
  `;
}
function buildAttendancePayload(){
  const A=state.attendance;
  const toObj=names=>{const o={};names.forEach(n=>o[n]=1);return o;};
  return {
    moulding:{day12:toObj(A.moulding.day12),night12:toObj(A.moulding.night12),hr8:toObj(A.moulding.hr8)},
    tufting:{day12:toObj(A.tufting.day12),night12:toObj(A.tufting.night12),hr8:toObj(A.tufting.hr8)},
    checking:{hr12:A.checking.hr12,hr8:A.checking.hr8},
    packaging:{day12:A.packaging.day12,hr8:A.packaging.hr8,night12:A.packaging.night12},
    overhead:{cleaning_8hr:A.overhead.cleaning_8hr,store_12hr:A.overhead.store_12hr,qc_12hr:A.overhead.qc_12hr}
  };
}

// ─── SUBMIT ──────────────────────────────────────────────────────────────────
async function submitSection(section){
  if(!pin){setStatus("err","Enter the supervisor PIN before submitting.");render();return;}
  if(!selDate){setStatus("err","Pick a date first.");render();return;}

  let payload;
  if(section==="handles") payload=state.handles;
  else if(section==="packaging") payload=state.packaging;
  else if(section==="attendance") payload=buildAttendancePayload();
  else payload=state[section];

  setStatus("info",`Submitting ${section}…`);render();

  try{
    const res=await fetch("/api/submit",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({pin,date:selDate,section,payload})
    });
    const json=await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(json.error||`HTTP ${res.status}`);
    localStorage.setItem("supervisorPin",pin);
    resetSection(section);
    setStatus("ok",`${section.charAt(0).toUpperCase()+section.slice(1)} data saved for ${selDate}.`);
  }catch(e){
    setStatus("err",`Could not save: ${e.message}`);
  }
  render();
}
function resetSection(section){
  const fresh=freshState();
  state[section]=fresh[section];
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
function render(){
  const tabs=[
    {id:"handles",label:"Handles",color:"#06d6a0"},
    {id:"printing",label:"Printing",color:"#fbbf24"},
    {id:"tufting",label:"Tufting",color:"#a78bfa"},
    {id:"trimming",label:"Trimming",color:"#f59e0b"},
    {id:"packaging",label:"Packaging",color:"#f97316"},
    {id:"attendance",label:"Attendance",color:"#fb7185"},
  ];
  let tabContent="";
  if(activeTab==="handles") tabContent=tabHandles();
  else if(activeTab==="printing") tabContent=tabSimpleRows("printing","Printing","₹0.10 per brush — enter units printed.","#fbbf24");
  else if(activeTab==="tufting") tabContent=tabSimpleRows("tufting","Tufting","Rate depends on model height.","#a78bfa");
  else if(activeTab==="trimming") tabContent=tabSimpleRows("trimming","Trimming","Included in tufting charge — units only, no separate revenue.","#f59e0b");
  else if(activeTab==="packaging") tabContent=tabPackaging();
  else if(activeTab==="attendance") tabContent=tabAttendance();

  const html=`
    <div class="header">
      <div>
        <div class="header-sub">Greenedge Ventures — Factory</div>
        <div class="header-title mono">Daily Data Entry</div>
      </div>
      <a class="dash-link" href="index.html">← Dashboard</a>
    </div>
    <div class="entry-bar">
      <div class="entry-field">
        <label>Date</label>
        <input type="date" id="date-input" value="${selDate}" onchange="setDate(this.value)"/>
      </div>
      <div class="entry-field">
        <label>Supervisor PIN</label>
        <input type="password" id="pin-input" value="${esc(pin)}" placeholder="••••" onchange="setPin(this.value)"/>
      </div>
    </div>
    <div class="tabs">
      ${tabs.map(t=>`<button class="tab-btn${activeTab===t.id?" active":""}" style="${activeTab===t.id?`background:${t.color}`:"background:rgba(255,255,255,0.05)"}" onclick="changeTab('${t.id}')">${t.label}</button>`).join("")}
    </div>
    ${statusMsg?`<div class="status-msg ${statusMsg.type}">${esc(statusMsg.text)}</div>`:""}
    <div id="tab-content">${tabContent}</div>
    <datalist id="clients-datalist">${CLIENTS.map(c=>`<option value="${esc(c)}"></option>`).join("")}</datalist>
    <div class="footer">Each tab submits independently and merges into that day's record — no need to fill every tab in one sitting.</div>
  `;
  document.getElementById("app").innerHTML=html;
}
function changeTab(t){activeTab=t;statusMsg=null;render();}
function setDate(v){selDate=v;}
function setPin(v){pin=v;}

// ─── INIT ────────────────────────────────────────────────────────────────────
loadMaster();
</script>
